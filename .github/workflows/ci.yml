name: anaplan-orm CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]

jobs:
  # ---------------------------------------------------------
  # JOB 1: TEST & LINT (Runs on PRs, Merges, and Releases)
  # ---------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Generate fresh lockfile on CI
        run: poetry lock

      - name: Install Dependencies
        run: poetry install --no-interaction

      - name: Run Linter (Ruff)
        run: poetry run ruff check .

      - name: Run Tests (Pytest)
        run: poetry run pytest

  # ---------------------------------------------------------
  # JOB 2: BUILD & PUBLISH (Runs ONLY on GitHub Releases)
  # ---------------------------------------------------------
  build-and-publish:
    needs: test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Generate fresh lockfile on CI
        run: poetry lock

      - name: Build Package
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ---------------------------------------------------------
  # JOB 3: DEPLOY DOCS (Runs ONLY on merges/pushes to main)
  # ---------------------------------------------------------
  deploy-docs:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for mkdocs to push to the gh-pages branch
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Generate fresh lockfile on CI
        run: poetry lock

      - name: Install Dependencies
        # This installs everything, including the dev group (MkDocs)
        run: poetry install --no-interaction

      - name: Deploy to GitHub Pages
        run: poetry run mkdocs gh-deploy --force
name: anaplan-orm CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]

jobs:
  # ---------------------------------------------------------
  # JOB 1: TEST & LINT (Runs on PRs, Merges, and Releases)
  # ---------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Generate fresh lockfile on CI
        run: poetry lock

      - name: Install Dependencies
        run: poetry install --no-interaction

      - name: Run Linter (Ruff)
        run: poetry run python3 -m ruff check .

      - name: Run Tests (Pytest)
        run: poetry run python3 -m pytest

  # ---------------------------------------------------------
  # JOB 2: BUILD & PUBLISH (Runs ONLY on GitHub Releases)
  # ---------------------------------------------------------
  build-and-publish:
    needs: test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Generate fresh lockfile on CI
        run: poetry lock

      - name: Build Package
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}